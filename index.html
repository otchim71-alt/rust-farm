<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Clan HQ - Управление Вайпом</title>
    <style>
        :root {
            --bg: #1e1e24;
            --card: #2a2a32;
            --accent: #cd412b;
            --text: #e2e8f0;
            --wood: #a0522d;
            --stone: #708090;
            --sulfur: #f1c40f;
            --iron: #7f8c8d;
            --gold: #f1c40f;
            --raid: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(rgba(20, 20, 24, 0.85), rgba(20, 20, 24, 0.92)), 
                        url('https://images.alphacoders.com/605/605593.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            padding: 20px;
            margin: 0;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        h1 span { color: var(--accent); }
        
        .section {
            background: var(--card);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }
        
        .admin-panel { border: 1px dashed var(--accent); display: none; }
        .flex-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        
        input[type="text"], input[type="number"] {
            background: #18181b; border: 1px solid #3f3f46;
            color: #fff; padding: 10px; border-radius: 4px; flex-grow: 1; min-width: 120px;
        }
        
        button {
            background: var(--accent); color: #fff; border: none;
            padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;
            transition: all 0.2s ease;
        }
        button:hover { filter: brightness(1.2); }
        button.secondary { background: #4b5563; }
        
        /* Кнопка Рейд Тревоги */
        .raid-btn {
            background: var(--raid);
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px var(--raid);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(231,76,60,0.6); }
            50% { box-shadow: 0 0 25px rgba(231,76,60,1); }
            100% { box-shadow: 0 0 10px rgba(231,76,60,0.6); }
        }

        /* Панель ссылок */
        .links-row { display: flex; gap: 10px; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; }
        .link-btn {
            flex: 1; min-width: 120px; text-align: center; background: #232329;
            color: #fff; text-decoration: none; padding: 10px; border-radius: 4px;
            font-weight: bold; border: 1px solid #3f3f46; transition: background 0.2s;
        }
        .link-btn:hover { background: #3f3f46; border-color: var(--accent); }

        /* Вайп Цели */
        .goal-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #1e1e24; padding: 10px 15px; border-radius: 6px; }
        .goal-info { flex-grow: 1; margin-right: 20px; }
        .goal-name { font-weight: bold; font-size: 1.05em; margin-bottom: 5px; }
        .progress-bg { background: #3f3f46; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; width: 0%; transition: width 0.3s; }
        .goal-controls { display: flex; gap: 5px; align-items: center; }
        .goal-counter { font-family: monospace; font-size: 1.1em; font-weight: bold; min-width: 70px; text-align: center; }
        .btn-small { padding: 5px 12px; font-size: 1.1em; background: #3f3f46; }

        /* Списки и строки игроков */
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 10px; border-bottom: 1px solid #3f3f46; flex-wrap: wrap; gap: 15px; }
        .player-name { font-size: 1.1em; font-weight: 600; min-width: 180px; }
        .player-norms { font-size: 0.82em; color: #a1a1aa; margin-top: 6px; font-weight: normal; line-height: 1.4; }
        .buttons-group { display: flex; gap: 6px; flex-wrap: wrap; }
        
        .status-btn {
            background: #3f3f46; color: #fff; border: none; padding: 8px 12px; border-radius: 4px;
            cursor: pointer; font-weight: bold; min-width: 90px; font-size: 0.85em; transition: all 0.2s ease;
        }
        .status-btn.active-wood { background-color: var(--wood); box-shadow: 0 0 8px var(--wood); }
        .status-btn.active-stone { background-color: var(--stone); box-shadow: 0 0 8px var(--stone); }
        .status-btn.active-sulfur { background-color: var(--sulfur); color: #000; box-shadow: 0 0 8px var(--sulfur); }
        .status-btn.active-iron { background-color: var(--iron); box-shadow: 0 0 8px var(--iron); }
        .delete-btn { color: #ef4444; cursor: pointer; margin-left: 10px; font-size: 0.9em; font-weight: bold; }

        .leaderboard-title { margin-top: 0; font-size: 1.4em; color: var(--gold); text-transform: uppercase; border-bottom: 2px solid #3f3f46; padding-bottom: 10px; letter-spacing: 1px; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 10px; border-radius: 4px; margin-bottom: 6px; background: #232329; }
        .top-farmila { background: linear-gradient(90deg, rgba(241,196,15,0.15) 0%, rgba(205,65,43,0.1) 100%); border: 1px solid var(--gold); font-weight: bold; }
        .badge-farmila { background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; text-transform: uppercase; box-shadow: 0 0 8px var(--accent); }
    </style>

    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="container">
    <!-- Логотип -->
    <div style="text-align: center; margin-bottom: 10px; margin-top: 10px;">
        <img src="https://files.facepunch.com/lewis/1b2911b1/rust-logo.png" style="width: 120px; filter: drop-shadow(0 0 10px var(--accent));">
    </div>

    <h1><span>RUST</span> Командный Центр</h1>

    <!-- 🚨 КНОПКА РЕЙД ТРЕВОГИ -->
    <button class="raid-btn" onclick="triggerRaidAlert()">🚨 Объявить Рейд-Тревогу (@everyone) 🚨</button>

    <!-- Панель быстрых ссылок -->
    <div class="links-row">
        <a href="https://rustlabs.com" target="_blank" class="link-btn">🛠️ Rust Labs</a>
        <a href="https://www.battlemetrics.com/servers/rust" target="_blank" class="link-btn">📊 Battlemetrics</a>
        <a href="https://rustmaps.com" target="_blank" class="link-btn">🗺️ Rust Maps</a>
    </div>

    <!-- 🚀 ГЛОВБАЛЬНЫЕ ЦЕЛИ НА ВАЙП -->
    <div class="section" style="border-left: 4px solid var(--accent);">
        <h2 style="margin-top:0; font-size: 1.3em; text-transform: uppercase; color: #fff;">🚀 Глобальные Цели Клана</h2>
        <div id="goalsContainer">
            <!-- Сюда рендерятся цели из базы -->
        </div>
    </div>
    
    <div style="text-align: right; margin-bottom: 15px;">
        <button class="secondary" onclick="toggleAdminPanel()">⚙️ Режим Лидера</button>
    </div>

    <!-- Панель управления -->
    <div id="adminPanel" class="section admin-panel">
        <h3 style="margin-top:0;">Добавить бойца и настроить нормы</h3>
        <div class="flex-row">
            <input type="text" id="playerName" placeholder="Ник соклановца">
            <input type="text" id="normWood" placeholder="Норма Дерева (напр. 20к)">
            <input type="text" id="normStone" placeholder="Норма Камня (напр. 15к)">
            <input type="text" id="normSulfur" placeholder="Норма Серы (напр. 5к)">
            <input type="text" id="normIron" placeholder="Норма Железа (напр. 10к)">
            <button onclick="addPlayer()">Добавить</button>
        </div>

        <h3 style="margin-top:20px;">Настройка Глобальных Целей (Лимиты)</h3>
        <div class="flex-row">
            <input type="number" id="targetRockets" placeholder="Цель Ракет">
            <input type="number" id="targetC4" placeholder="Цель C4">
            <input type="number" id="targetExplosive" placeholder="Цель Взрывных">
            <button onclick="updateWipeTargets()" style="background: #2e7d32;">Сохранить Цели</button>
        </div>

        <div style="margin-top: 25px; text-align: right;">
            <button onclick="resetAll()" style="background: #b91c1c;">🔄 Вручную обнулить ресурсы у всех</button>
        </div>
    </div>

    <!-- ДОСКА ПОЧЕТА -->
    <div class="section" style="border: 1px solid rgba(241,196,15,0.3);">
        <h2 class="leaderboard-title">🏆 ДОСКА ПОЧЕТА 🏆</h2>
        <div id="leaderboardList">
            <p style="color: #a1a1aa; text-align:center;">Расчет рейтингов...</p>
        </div>
    </div>

    <!-- Таблица отметки -->
    <div class="section">
        <div id="dbStatus" style="font-size: 0.9em; font-weight: bold; color: #a1a1aa; float: right;">Проверка связи...</div>
        
        <h2 style="margin-top: 0; font-size: 1.3em; border-bottom: 2px solid #3f3f46; padding-bottom: 10px;">Суточный отчет ресурсов:</h2>
        <div id="playersList">
            <p style="color: #a1a1aa; text-align:center;">Загрузка данных...</p>
        </div>
    </div>
</div>

<script>
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1525106273421623447/ac0RjtpRW5t23eFDwm-PuMfmpIEqpLruIKfxCS6dsnQjZX5Z3u41LQYiqDnuNYrgV4rW";
    const LEADER_PASSWORD = "rust"; 

    const firebaseConfig = {
        apiKey: "AIzaSyB52SgZbNHyj4ixrhW0kw9UbL6WEgsvmwU",
        authDomain: "farm-5351c.firebaseapp.com",
        databaseURL: "https://farm-5351c-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "farm-5351c",
        storageBucket: "farm-5351c.firebasestorage.app",
        messagingSenderId: "231801165075",
        appId: "1:231801165075:web:2e872ea1b2c7e235b7f6e6",
        measurementId: "G-KWVW67DN4H"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 🎵 СИНТЕЗАТОР ЗВУКОВ (Web Audio API)
    function playCodeLockSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        let time = ctx.currentTime;
        for (let i = 0; i < 3; i++) {
            let osc = ctx.createOscillator();
            let gain = ctx.createGain();
            osc.frequency.setValueAtTime(1800, time);
            gain.gain.setValueAtTime(0.08, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(time); osc.stop(time + 0.06);
            time += 0.09;
        }
        let oscClick = ctx.createOscillator();
        let gainClick = ctx.createGain();
        oscClick.type = 'triangle';
        oscClick.frequency.setValueAtTime(120, time);
        gainClick.gain.setValueAtTime(0.15, time);
        gainClick.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
        oscClick.connect(gainClick); gainClick.connect(ctx.destination);
        oscClick.start(time); oscClick.stop(time + 0.04);
    }

    function playHitSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        let time = ctx.currentTime;
        let osc = ctx.createOscillator();
        let gain = ctx.createGain();
        osc.frequency.setValueAtTime(950, time);
        osc.frequency.exponentialRampToValueAtTime(150, time + 0.08);
        gain.gain.setValueAtTime(0.12, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(time); osc.stop(time + 0.08);
    }

    // Автоматический сброс каждый день
    function checkDailyReset() {
        const todayStr = new Date().toLocaleDateString('ru-RU');
        database.ref('metadata/lastResetDate').once('value', function(snapshot) {
            if (snapshot.val() !== todayStr) {
                database.ref('metadata/lastResetDate').set(todayStr).then(function() {
                    database.ref('players').once('value', function(pSnap) {
                        const players = pSnap.val();
                        if (!players) return;
                        for (let id in players) {
                            database.ref('players/' + id).update({ wood: false, stone: false, sulfur: false, iron: false });
                        }
                    });
                });
            }
        });
    }

    database.ref('.info/connected').on('value', function(snapshot) {
        const statusDiv = document.getElementById('dbStatus');
        if (snapshot.val() === true) {
            statusDiv.innerHTML = '🟢 База подключена';
            statusDiv.style.color = '#2e7d32';
            checkDailyReset();
        } else {
            statusDiv.innerHTML = '🔴 Нет связи с базой';
            statusDiv.style.color = '#ef4444';
        }
    });

    // Функция Рейд-Тревоги в Discord
    window.triggerRaidAlert = function() {
        if(!confirm("⚠️ ВНИМАНИЕ! Вы уверены, что хотите объявить РЕЙД-ТРЕВОГУ? Это отправит вебхук с тегом @everyone во весь Дискорд клана!")) return;

        const payload = {
            content: "@everyone 🚨🚨🚨 **БАЗУ РЕЙДЯТ! ВСЕ В ИГРУ СРОЧНО! ДЕФАЕМ!** 🚨🚨🚨",
            username: "🚨 СИРЕНА БАЗЫ 🚨",
            avatar_url: "https://cdn-icons-png.flaticon.com/512/595/595067.png"
        };

        fetch(DISCORD_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(() => alert("🚨 Сигнал тревоги успешно отправлен в Discord!"))
          .catch(err => alert("Ошибка отправки тревоги: " + err.message));
    };

    // Отчеты в Discord обычного фарма
    function sendDiscordNotification(playerName, type) {
        if (!DISCORD_WEBHOOK_URL) return;
        let resourceName = '', color = 0;
        if (type === 'wood') { resourceName = '🪵 Дерево'; color = 10506805; }
        else if (type === 'stone') { resourceName = '🪨 Камень'; color = 7372944; }
        else if (type === 'sulfur') { resourceName = '🟨 Сера'; color = 15844367; }
        else if (type === 'iron') { resourceName = '🔩 Металл'; color = 8359053; }

        const payload = {
            username: "Контроль Шкафа",
            avatar_url: "https://files.facepunch.com/lewis/1b2911b1/rust-logo.png",
            embeds: [{
                title: "⛏️ Норма фарма выполнена!",
                description: `Игрок **${playerName}** закинул ресурсы и закрыл норму.`,
                color: color,
                fields: [
                    { name: "Соклановец", value: playerName, inline: true },
                    { name: "Что сдано", value: resourceName, inline: true }
                ],
                timestamp: new Date().toISOString()
            }]
        };
        fetch(DISCORD_WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
    }

    // Управление целями
    window.updateWipeTargets = function() {
        const r = parseInt(document.getElementById('targetRockets').value) || 0;
        const c = parseInt(document.getElementById('targetC4').value) || 0;
        const e = parseInt(document.getElementById('targetExplosive').value) || 0;
        
        database.ref('goals').update({
            rockets_target: r,
            c4_target: c,
            explosive_target: e
        }).then(() => alert("Цели вайпа успешно сохранены!"));
    };

    window.changeGoalValue = function(type, step) {
        playHitSound();
        database.ref('goals/' + type).once('value', function(snap) {
            let current = snap.val() || 0;
            let next = Math.max(0, current + step);
            database.ref('goals/' + type).set(next);
        });
    };

    window.toggleAdminPanel = function() {
        const panel = document.getElementById('adminPanel');
        if (panel.style.display !== 'block') {
            const pass = prompt("Введите пароль лидера:");
            if (pass !== LEADER_PASSWORD) {
                alert("Неверный пароль!");
                return;
            }
            playCodeLockSound();
        }
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    };

    window.addPlayer = function() {
        const nameInput = document.getElementById('playerName');
        const name = nameInput.value.trim();
        if(!name) return alert("Введи ник!");
        
        const id = name.replace(/[.#$/\[\]]/g, "_");
        database.ref('players/' + id).set({
            name: name,
            normWood: document.getElementById('normWood').value.trim() || "Не задана",
            normStone: document.getElementById('normStone').value.trim() || "Не задана",
            normSulfur: document.getElementById('normSulfur').value.trim() || "Не задана",
            normIron: document.getElementById('normIron').value.trim() || "Не задана",
            wood: false, stone: false, sulfur: false, iron: false, totalPoints: 0
        }).then(() => {
            nameInput.value = ''; document.getElementById('normWood').value = '';
            document.getElementById('normStone').value = ''; document.getElementById('normSulfur').value = '';
            document.getElementById('normIron').value = '';
        });
    };

    window.toggleStatus = function(id, type, currentStatus, playerName) {
        playHitSound();
        const nextStatus = !currentStatus;
        database.ref('players/' + id).once('value', function(snapshot) {
            const player = snapshot.val();
            let currentPoints = player.totalPoints || 0;
            currentPoints = nextStatus ? currentPoints + 1 : Math.max(0, currentPoints - 1);

            const updates = {};
            updates[type] = nextStatus;
            updates['totalPoints'] = currentPoints;

            database.ref('players/' + id).update(updates).then(function() {
                if (nextStatus) sendDiscordNotification(playerName, type);
            });
        });
    };

    window.deletePlayer = function(id) {
        if(confirm("Удалить игрока?")) database.ref('players/' + id).remove();
    };

    window.resetAll = function() {
        if(confirm("Обнулить суточные ресурсы у всех?")) {
            database.ref('players').once('value', function(snapshot) {
                const data = snapshot.val();
                for(let id in data) database.ref('players/' + id).update({ wood: false, stone: false, sulfur: false, iron: false });
            });
        }
    };

    // Рендеринг Глобальных Целей Клана
    function renderGoals(goalsData) {
        const container = document.getElementById('goalsContainer');
        container.innerHTML = '';
        const data = goalsData || {};

        const items = [
            { key: 'rockets', label: '🚀 Ракеты', current: data.rockets || 0, target: data.rockets_target || 0 },
            { key: 'c4', label: '💣 Заряды C4', current: data.c4 || 0, target: data.c4_target || 0 },
            { key: 'explosive', label: '💥 Взрывные патроны', current: data.explosive || 0, target: data.explosive_target || 0 }
        ];

        items.forEach(item => {
            const percent = item.target > 0 ? Math.min((item.current / item.target) * 100, 100) : 0;
            const div = document.createElement('div');
            div.className = 'goal-row';
            div.innerHTML = `
                <div class="goal-info">
                    <div class="goal-name">${item.label}</div>
                    <div class="progress-bg"><div class="progress-bar" style="width: ${percent}%"></div></div>
                </div>
                <div class="goal-controls">
                    <button class="status-btn btn-small" onclick="changeGoalValue('${item.key}', -1)">-</button>
                    <div class="goal-counter">${item.current} / ${item.target}</div>
                    <button class="status-btn btn-small" onclick="changeGoalValue('${item.key}', 1)">+</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // Рендеринг Списков Игроков и Доски Почета
    function renderPlayers(data) {
        const playersListDiv = document.getElementById('playersList');
        const leaderboardListDiv = document.getElementById('leaderboardList');
        playersListDiv.innerHTML = ''; leaderboardListDiv.innerHTML = '';
        
        if (!data) {
            playersListDiv.innerHTML = '<p style="text-align:center;color:#a1a1aa;">Список пуст.</p>';
            leaderboardListDiv.innerHTML = '<p style="text-align:center;color:#a1a1aa;">Нет данных.</p>';
            return;
        }

        let playersArray = [];
        for (let id in data) playersArray.push({ id: id, ...data[id] });
        playersArray.sort((a, b) => (b.totalPoints || 0) - (a.totalPoints || 0));

        // Доска Почета
        playersArray.forEach((player, idx) => {
            const pts = player.totalPoints || 0;
            const item = document.createElement('div');
            item.className = 'leaderboard-item';
            if (idx === 0 && pts > 0) {
                item.className += ' top-farmila';
                item.innerHTML = `<span>👑 <b>${player.name}</b></span><span style="display:flex;gap:10px;align-items:center;"><span class="badge-farmila">фармила года</span><span style="color:var(--gold);font-weight:bold;">${pts} очков</span></span>`;
            } else {
                item.innerHTML = `<span>${idx + 1}. ${player.name}</span><span style="color:#a1a1aa;">${pts} очков</span>`;
            }
            leaderboardListDiv.appendChild(item);
        });

        // Суточный отчет
        const isAdminVisible = document.getElementById('adminPanel').style.display === 'block';
        for (let id in data) {
            const p = data[id];
            const row = document.createElement('div');
            row.className = 'player-row';
            const safeName = p.name.replace(/'/g, "\\'");
            
            row.innerHTML = `
                <div class="player-name">
                    ${p.name} <span class="delete-btn" style="display: ${isAdminVisible ? 'inline' : 'none'};" onclick="deletePlayer('${id}')">[❌]</span>
                    <div class="player-norms">
                        🪵 Норма: <b>${p.normWood || 'Нет'}</b> | 🪨 Норма: <b>${p.normStone || 'Нет'}</b><br>
                        🟨 Норма: <b>${p.normSulfur || 'Нет'}</b> | 🔩 Норма: <b>${p.normIron || 'Нет'}</b>
                    </div>
                </div>
                <div class="buttons-group">
                    <button class="status-btn ${p.wood ? 'active-wood' : ''}" onclick="toggleStatus('${id}', 'wood', ${p.wood || false}, '${safeName}')">🪵 ${p.wood ? 'Сдал' : 'Не сдал'}</button>
                    <button class="status-btn ${p.stone ? 'active-stone' : ''}" onclick="toggleStatus('${id}', 'stone', ${p.stone || false}, '${safeName}')">🪨 ${p.stone ? 'Сдал' : 'Не сдал'}</button>
                    <button class="status-btn ${p.sulfur ? 'active-sulfur' : ''}" onclick="toggleStatus('${id}', 'sulfur', ${p.sulfur || false}, '${safeName}')">🟨 ${p.sulfur ? 'Сдал' : 'Не сдал'}</button>
                    <button class="status-btn ${p.iron ? 'active-iron' : ''}" onclick="toggleStatus('${id}', 'iron', ${p.iron || false}, '${safeName}')">🔩 ${p.iron ? 'Сдал' : 'Не сдал'}</button>
                </div>
            `;
            playersListDiv.appendChild(row);
        }
    }

    // Слушатели Firebase
    database.ref('goals').on('value', snapshot => renderGoals(snapshot.val()));
    database.ref('players').on('value', snapshot => renderPlayers(snapshot.val()));
</script>
</body>
</html>
