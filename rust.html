<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Farm - Контроль нормы</title>
    <style>
        :root {
            --bg: #1e1e24;
            --card: #2a2a32;
            --accent: #cd412b;
            --text: #e2e8f0;
            --wood: #a0522d;
            --stone: #708090;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            margin: 0;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 30px; }
        h1 span { color: var(--accent); }
        .section {
            background: var(--card);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }
        .admin-panel { 
            border: 1px dashed var(--accent); 
            display: none; 
        }
        .flex-row { display: flex; gap: 10px; margin-top: 10px; }
        input[type="text"] {
            background: #18181b; border: 1px solid #3f3f46;
            color: #fff; padding: 10px; border-radius: 4px; flex-grow: 1;
        }
        button {
            background: var(--accent); color: #fff; border: none;
            padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        button.secondary { background: #4b5563; }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10px;
            border-bottom: 1px solid #3f3f46;
        }
        .player-name { font-size: 1.1em; font-weight: 600; }
        .buttons-group { display: flex; gap: 10px; }
        
        .status-btn {
            background: #3f3f46;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            min-width: 110px;
            transition: all 0.2s ease;
        }
        .status-btn.active-wood { background-color: var(--wood); box-shadow: 0 0 10px var(--wood); }
        .status-btn.active-stone { background-color: var(--stone); box-shadow: 0 0 10px var(--stone); }
        .delete-btn { color: #ef4444; cursor: pointer; margin-left: 10px; font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1><span>RUST</span> Контроль нормы</h1>
    
    <div style="text-align: right; margin-bottom: 15px;">
        <button class="secondary" onclick="toggleAdminPanel()">⚙️ Режим Лидера</button>
    </div>

    <div id="adminPanel" class="section admin-panel">
        <h3 style="margin-top:0;">Добавить бойца в список</h3>
        <div class="flex-row">
            <input type="text" id="playerName" placeholder="Введи ник соклановца">
            <button onclick="addPlayer()">Добавить</button>
        </div>
        <div style="margin-top: 25px; text-align: right;">
            <button onclick="resetAll()" style="background: #b91c1c;">🔄 Обнулить всех (Новый день)</button>
        </div>
    </div>

    <div class="section">
        <h2 style="margin-top: 0; font-size: 1.3em; border-bottom: 2px solid #3f3f46; padding-bottom: 10px;">Суточный отчет:</h2>
        <div id="playersList">
            <p style="color: #a1a1aa; text-align:center;">Загрузка данных...</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Данные твоего проекта со скриншота + databaseURL
    const firebaseConfig = {
        apiKey: "AIzaSyB52SgZbNHyj4ixrhW0kw9UbL6WEgsvmwU",
        authDomain: "farm-5351c.firebaseapp.com",
        databaseURL: "https://farm-5351c-default-rtdb.firebaseio.com",
        projectId: "farm-5351c",
        storageBucket: "farm-5351c.firebasestorage.app",
        messagingSenderId: "231801165075",
        appId: "1:231801165075:web:2e872ea1b2c7e235b7f6e6",
        measurementId: "G-KWVW67DN4H"
    };

    // Старт базы данных
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Функция открытия/закрытия админки
    window.toggleAdminPanel = () => {
        const panel = document.getElementById('adminPanel');
        if (panel.style.display === 'block') {
            panel.style.display = 'none';
        } else {
            panel.style.display = 'block';
        }
        // Обновляем отображение кнопок удаления при открытии панели
        renderList();
    };

    // Функция добавления игрока
    window.addPlayer = () => {
        const nameInput = document.getElementById('playerName');
        const name = nameInput.value.trim();
        if(!name) return;
        
        const id = name.replace(/[.#$/\[\]]/g, "_");
        
        set(ref(db, 'players/' + id), {
            name: name,
            wood: false,
            stone: false
        }).then(() => {
            nameInput.value = '';
        }).catch(err => alert("Ошибка записи в базу: " + err.message));
    };

    // Функция переключения галочки сдал/не сдал
    window.toggleStatus = (id, type, currentStatus) => {
        const updates = {};
        updates[`players/${id}/${type}`] = !currentStatus;
        update(ref(db), updates);
    };

    // Функция удаления соклановца
    window.deletePlayer = (id) => {
        if(confirm("Удалить игрока из списка?")) {
            remove(ref(db, 'players/' + id));
        }
    };

    // Функция полного сброса
    window.resetAll = () => {
        if(confirm("Сбросить статус нормы у ВСЕХ игроков?")) {
            onValue(ref(db, 'players'), (snapshot) => {
                const data = snapshot.val();
                if(!data) return;
                const updates = {};
                for(let id in data) {
                    updates[`players/${id}/wood`] = false;
                    updates[`players/${id}/stone`] = false;
                }
                update(ref(db), updates);
            }, { onlyOnce: true });
        }
    };

    const playersListDiv = document.getElementById('playersList');
    let currentData = null;

    // Отрисовка списка на экране
    function renderList() {
        playersListDiv.innerHTML = '';
        
        if (!currentData) {
            playersListDiv.innerHTML = '<p style="color: #a1a1aa; text-align:center;">Список пуст. Открой "Режим Лидера" и добавь людей.</p>';
            return;
        }

        const panel = document.getElementById('adminPanel');
        const isAdminVisible = panel && panel.style.display === 'block';

        for (let id in currentData) {
            const player = currentData[id];
            const row = document.createElement('div');
            row.className = 'player-row';
            
            row.innerHTML = `
                <div class="player-name">
                    ${player.name}
                    <span class="delete-btn" style="display: ${isAdminVisible ? 'inline' : 'none'};" onclick="deletePlayer('${id}')">[❌]</span>
                </div>
                <div class="buttons-group">
                    <button class="status-btn ${player.wood ? 'active-wood' : ''}" onclick="toggleStatus('${id}', 'wood', ${player.wood})">
                        ${player.wood ? '🪵 Сдал' : '🪵 Не сдал'}
                    </button>
                    <button class="status-btn ${player.stone ? 'active-stone' : ''}" onclick="toggleStatus('${id}', 'stone', ${player.stone})">
                        ${player.stone ? '🪨 Сдал' : '🪨 Не сдал'}
                    </button>
                </div>
            `;
            playersListDiv.appendChild(row);
        }
    }

    // Слушаем базу данных Firebase в реальном времени
    onValue(ref(db, 'players'), (snapshot) => {
        currentData = snapshot.val();
        renderList();
    });
</script>
</body>
</html>
