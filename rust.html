<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Farm - Контроль нормы</title>
    <style>
        :root {
            --bg: #1e1e24;
            --card: #2a2a32;
            --accent: #cd412b;
            --text: #e2e8f0;
            --wood: #a0522d;
            --stone: #708090;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            margin: 0;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 30px; }
        h1 span { color: var(--accent); }
        .section {
            background: var(--card);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }
        .admin-panel { 
            border: 1px dashed var(--accent); 
            display: none; 
        }
        .flex-row { display: flex; gap: 10px; margin-top: 10px; }
        input[type="text"] {
            background: #18181b; border: 1px solid #3f3f46;
            color: #fff; padding: 10px; border-radius: 4px; flex-grow: 1;
        }
        button {
            background: var(--accent); color: #fff; border: none;
            padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        button.secondary { background: #4b5563; }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10px;
            border-bottom: 1px solid #3f3f46;
        }
        .player-name { font-size: 1.1em; font-weight: 600; }
        .buttons-group { display: flex; gap: 10px; }
        
        .status-btn {
            background: #3f3f46;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            min-width: 110px;
            transition: all 0.2s ease;
        }
        .status-btn.active-wood { background-color: var(--wood); box-shadow: 0 0 10px var(--wood); }
        .status-btn.active-stone { background-color: var(--stone); box-shadow: 0 0 10px var(--stone); }
        .delete-btn { color: #ef4444; cursor: pointer; margin-left: 10px; font-size: 0.9em; font-weight: bold; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="container">
    <h1><span>RUST</span> Контроль нормы</h1>
    
    <div style="text-align: right; margin-bottom: 15px;">
        <button class="secondary" onclick="toggleAdminPanel()">⚙️ Режим Лидера</button>
    </div>

    <div id="adminPanel" class="section admin-panel">
        <h3 style="margin-top:0;">Добавить бойца в список</h3>
        <div class="flex-row">
            <input type="text" id="playerName" placeholder="Введи ник соклановца">
            <button onclick="addPlayer()">Добавить</button>
        </div>
        <div style="margin-top: 25px; text-align: right;">
            <button onclick="resetAll()" style="background: #b91c1c;">🔄 Обнулить всех (Новый день)</button>
        </div>
    </div>

    <div class="section">
        <div id="dbStatus" style="font-size: 0.9em; font-weight: bold; color: #a1a1aa; float: right;">Проверка связи...</div>
        
        <h2 style="margin-top: 0; font-size: 1.3em; border-bottom: 2px solid #3f3f46; padding-bottom: 10px;">Суточный отчет:</h2>
        <div id="playersList">
            <p style="color: #a1a1aa; text-align:center;">Загрузка данных...</p>
        </div>
    </div>

    <div id="debugLog" class="section" style="display: none; border: 1px solid #ef4444; background: #3b1818;">
        <h3 style="color: #ef4444; margin-top: 0;">Окно отладки (Тут появится ошибка, если что-то сломалось):</h3>
        <div id="debugContent" style="font-family: monospace; font-size: 0.95em;"></div>
    </div>
</div>

<script>
    // Автоматический перехват скрытых ошибок браузера
    window.onerror = function(message, source, lineno, colno, error) {
        document.getElementById('debugLog').style.display = 'block';
        document.getElementById('debugContent').innerHTML += '<p style="color: #ef4444; margin: 5px 0;">❌ Ошибка скрипта: ' + message + ' (Строка: ' + lineno + ')</p>';
        return false;
    };

    const firebaseConfig = {
        apiKey: "AIzaSyB52SgZbNHyj4ixrhW0kw9UbL6WEgsvmwU",
        authDomain: "farm-5351c.firebaseapp.com",
        databaseURL: "https://farm-5351c-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "farm-5351c",
        storageBucket: "farm-5351c.firebasestorage.app",
        messagingSenderId: "231801165075",
        appId: "1:231801165075:web:2e872ea1b2c7e235b7f6e6",
        measurementId: "G-KWVW67DN4H"
    };

    if (typeof firebase === 'undefined') {
        document.getElementById('debugLog').style.display = 'block';
        document.getElementById('debugContent').innerHTML += '<p style="color: #ef4444;">❌ Ошибка: Скрипты Google Firebase заблокированы вашим браузером, расширением (AdBlock/uBlock) или VPN. Отключите их для этого файла.</p>';
    } else {
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Отслеживаем коннект к облаку Google
        database.ref('.info/connected').on('value', function(snapshot) {
            const statusDiv = document.getElementById('dbStatus');
            if (snapshot.val() === true) {
                statusDiv.innerHTML = '🟢 База подключена';
                statusDiv.style.color = '#2e7d32';
            } else {
                statusDiv.innerHTML = '🔴 Нет связи с базой';
                statusDiv.style.color = '#ef4444';
            }
        });

        window.toggleAdminPanel = function() {
            const panel = document.getElementById('adminPanel');
            if (!panel) return;
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
            
            database.ref('players').once('value', function(snapshot) {
                renderList(snapshot.val());
            });
        };

        window.addPlayer = function() {
            const nameInput = document.getElementById('playerName');
            if (!nameInput) return;
            const name = nameInput.value.trim();
            if(!name) {
                alert("Сначала введи ник соклановца!");
                return;
            }
            
            const id = name.replace(/[.#$/\[\]]/g, "_");
            
            database.ref('players/' + id).set({
                name: name,
                wood: false,
                stone: false
            }).then(function() {
                nameInput.value = '';
            }).catch(function(err) {
                document.getElementById('debugLog').style.display = 'block';
                document.getElementById('debugContent').innerHTML += '<p style="color: #ef4444;">❌ Ошибка Firebase при добавлении: ' + err.message + '</p>';
            });
        };

        window.toggleStatus = function(id, type, currentStatus) {
            const updates = {};
            updates[type] = !currentStatus;
            database.ref('players/' + id).update(updates).catch(function(err) {
                alert("Ошибка изменения статуса: " + err.message);
            });
        };

        window.deletePlayer = function(id) {
            if(confirm("Удалить игрока из списка?")) {
                database.ref('players/' + id).remove();
            }
        };

        window.resetAll = function() {
            if(confirm("Сбросить статус нормы у ВСЕХ игроков?")) {
                database.ref('players').once('value', function(snapshot) {
                    const data = snapshot.val();
                    if(!data) return;
                    for(let id in data) {
                        database.ref('players/' + id).update({ wood: false, stone: false });
                    }
                });
            }
        };

        const playersListDiv = document.getElementById('playersList');

        function renderList(data) {
            if (!playersListDiv) return;
            playersListDiv.innerHTML = '';
            
            if (!data) {
                playersListDiv.innerHTML = '<p style="color: #a1a1aa; text-align:center;">Список пуст. Открой "Режим Лидера" и добавь людей.</p>';
                return;
            }

            const panel = document.getElementById('adminPanel');
            const isAdminVisible = panel && panel.style.display === 'block';

            for (let id in data) {
                const player = data[id];
                const row = document.createElement('div');
                row.className = 'player-row';
                
                row.innerHTML = `
                    <div class="player-name">
                        ${player.name}
                        <span class="delete-btn" style="display: ${isAdminVisible ? 'inline' : 'none'};" onclick="deletePlayer('${id}')">[❌]</span>
                    </div>
                    <div class="buttons-group">
                        <button class="status-btn ${player.wood ? 'active-wood' : ''}" onclick="toggleStatus('${id}', 'wood', ${player.wood})">
                            ${player.wood ? '🪵 Сдал' : '🪵 Не сдал'}
                        </button>
                        <button class="status-btn ${player.stone ? 'active-stone' : ''}" onclick="toggleStatus('${id}', 'stone', ${player.stone})">
                            ${player.stone ? '🪨 Сдал' : '🪨 Не сдал'}
                        </button>
                    </div>
                `;
                playersListDiv.appendChild(row);
            }
        }

        database.ref('players').on('value', function(snapshot) {
            renderList(snapshot.val());
        });
    }
</script>
</body>
</html>
